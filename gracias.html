<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitud enviada | HALEVERSE</title>
  <meta name="description" content="Gracias por contactar a HALEVERSE.">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --navy: #0a2540;
      --green: #10b981;
      --cyan: #67e8f9;
      --slate: #64748b;
      --ice: #f8fafc;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: Inter, Aptos, "Segoe UI", Arial, sans-serif;
      color: var(--ice);
      background:
        radial-gradient(circle at 80% 15%, rgba(103, 232, 249, .16), transparent 30%),
        radial-gradient(circle at 18% 82%, rgba(16, 185, 129, .16), transparent 32%),
        var(--navy);
    }
    main {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid rgba(216, 227, 239, .22);
      border-radius: 10px;
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .25);
    }
    img {
      width: 260px;
      max-width: 100%;
      margin-bottom: 34px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--green);
      font-weight: 850;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .badge::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 26px;
      color: #d8e3ef;
      font-size: 18px;
      line-height: 1.55;
    }
    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 6px;
      background: var(--green);
      color: #06251b;
      font-weight: 850;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/logo-horizontal-dark.svg" alt="HALEVERSE">
    <div class="badge">Solicitud recibida</div>
    <h1>Gracias por contactar a HALEVERSE.</h1>
    <p>Tu mensaje fue enviado a contacto@haleverse.com. Revisaremos la información y responderemos lo antes posible.</p>
    <a href="/">Volver al inicio</a>
  </main>
</body>
</html>
